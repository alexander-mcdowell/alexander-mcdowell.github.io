<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | prepend: site.baseurl }}">
  <link rel="shortcut icon" type="image/png" href="/favicon.png">
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}

  <style type="text/css">
    .annotated {
        border-bottom: 1px dashed #888;
        cursor: help;
        position: relative;
    }

    .popup {
        text-align: center;
        display: none;
        position: absolute;
        bottom: calc(100%);
        left: 50%;
        transform: translateX(-50%);
        background: #c4c4c4;
        color: #000;
        padding: 6px 10px;
        border-radius: 10px;
        white-space: nowrap;
        font-size: 0.85rem;
        z-index: 100; /* Ensures that the window is always at the top */
        pointer-events: none;
    }

    .annotated:hover .popup {
        display: block;
    }

    .accordion {
      background-color: #eee;
      color: #444;
      cursor: pointer;
      padding: 18px;
      width: 100%;
      border: none;
      text-align: left;
      outline: none;
      font-size: 15px;
      transition: 0.4s;
    }

    .active, .accordion:hover {
      background-color: #ccc;
    }

    .panel {
      padding: 0 18px;
      background-color: white;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.2s ease-out;
    }
  </style>
</head>
